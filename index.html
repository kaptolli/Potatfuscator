<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POTATFUSCATOR | V21 PARADOX</title>
<style>
:root { --accent: #3498db; --glass: rgba(5, 12, 25, 0.85); }
body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow-x: hidden; font-family: 'Consolas', monospace; }
#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #050a16 0%, #000 100%); z-index: -2; }
#rainCanvas { position: fixed; top: 0; left: 0; z-index: -1; pointer-events: none; }
.wrapper { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
.container {
width: 100%; max-width: 480px; background: var(--glass); border: 1px solid rgba(52, 152, 219, 0.25);
box-shadow: 0 0 70px rgba(0,0,0,0.8); padding: 35px; border-radius: 35px;
text-align: center; color: #fff; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
}
h1 { font-size: 11px; letter-spacing: 10px; margin-bottom: 25px; color: var(--accent); text-transform: uppercase; }
textarea {
width: 100%; height: 130px; background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(52, 152, 219, 0.2);
color: #85c1e9; padding: 15px; font-size: 12px; border-radius: 15px; outline: none; resize: none;
margin-bottom: 20px; box-sizing: border-box; font-family: 'Consolas', monospace;
}
button {
width: 100%; background: #fff; color: #000; border: none; padding: 18px;
font-weight: 900; border-radius: 15px; cursor: pointer; margin-bottom: 12px;
text-transform: uppercase; font-size: 11px; transition: 0.3s;
}
button:hover { background: var(--accent); color: #fff; transform: scale(1.02); }
.label-row { display: flex; justify-content: space-between; font-size: 10px; margin-bottom: 10px; color: #3498db; }
input[type=range] { width: 100%; accent-color: var(--accent); margin-bottom: 20px; cursor: pointer; }
.status-bar { margin-top: 20px; font-size: 9px; color: #2e4469; text-transform: uppercase; letter-spacing: 4px; }
.copy-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid #444; }
</style>
</head>
<body>
<div id="bg"></div>
<canvas id="rainCanvas"></canvas>
<div class="wrapper">
<div class="container">
<h1>PARADOX V21</h1>
<div class="label-row"><span>SCRAMBLE POWER</span><span id="junkVal">400</span></div>
<input type="range" id="junkRange" min="100" max="1500" value="400">
<textarea id="input" placeholder="-- Paste Lua script..."></textarea>
<button onclick="obfuscate()">Generate Paradox VM</button>
<button class="copy-btn" onclick="copyCode()">Copy to Clipboard</button>
<textarea id="output" readonly placeholder="Result..."></textarea>
<div class="status-bar" id="status">Proxy Tables | Dead Branches | V21</div>
</div>
</div>
<script>
const canvas = document.getElementById('rainCanvas');
const ctx = canvas.getContext('2d');
let w, h, drops = [];

function init() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    drops = [];
    for (let i = 0; i < 150; i++) 
        drops.push({x: Math.random()*w, y: Math.random()*h, l: Math.random()*30, v: Math.random()*15+8, o: Math.random()*0.4});
}

function draw() {
    ctx.clearRect(0,0,w,h);
    drops.forEach(d => {
        ctx.strokeStyle = `rgba(52, 152, 219, ${d.o})`;
        ctx.lineWidth = 1.5;
        ctx.beginPath(); 
        ctx.moveTo(d.x, d.y); 
        ctx.lineTo(d.x, d.y+d.l); 
        ctx.stroke();
        d.y += d.v; 
        if(d.y > h) d.y = -30;
    });
    requestAnimationFrame(draw);
}

window.onresize = init; 
init(); 
draw();

document.getElementById('junkRange').oninput = function() {
    document.getElementById('junkVal').textContent = this.value;
};

function hideN(n) {
    const ops = [
        () => {
            const r = Math.floor(Math.random() * 99) + 1;
            return `(${n + r}-${r})`;
        },
        () => {
            const r = Math.floor(Math.random() * 20) + 2;
            return `(${n * r}/${r})`;
        },
        () => {
            const r = Math.floor(Math.random() * 50) + 1;
            return `(${n}+${r}-${r})`;
        },
        () => {
            return `${n}`;
        }
    ];
    return ops[Math.floor(Math.random() * ops.length)]();
}

function genSym(len = 8) { 
    const chars = "Il1O0_";
    let name = "_";
    for (let i = 0; i < len; i++) {
        name += chars[Math.floor(Math.random() * chars.length)];
    }
    return name;
}

function obfuscate() {
    let code = document.getElementById('input').value;
    if(!code.trim()) {
        document.getElementById('status').innerText = "ERROR: EMPTY INPUT";
        return;
    }
    
    // Генерируем ключи
    const k1 = Math.floor(Math.random() * 200) + 10;
    const k2 = Math.floor(Math.random() * 200) + 10;
    
    // Превращаем код в байты (простое XOR шифрование)
    let bytes = [];
    for (let i = 0; i < code.length; i++) {
        bytes.push(code.charCodeAt(i) ^ k1 ^ k2);
    }
    
    const junkSize = parseInt(document.getElementById('junkRange').value);
    
    // Создаём мусорный массив
    let landfill = [];
    for (let i = 0; i < junkSize; i++) {
        landfill.push(hideN(Math.floor(Math.random() * 255)));
    }
    
    // Создаём карту индексов
    let map = [];
    let pool = [];
    for (let i = 0; i < junkSize; i++) {
        pool.push(i);
    }
    
    // Размещаем реальные байты в случайных позициях
    for (let i = 0; i < bytes.length; i++) {
        if (pool.length === 0) {
            // Если пул закончился, расширяем массив
            const oldLen = landfill.length;
            for (let j = 0; j < 100; j++) {
                landfill.push(hideN(Math.floor(Math.random() * 255)));
                pool.push(oldLen + j);
            }
        }
        const randomIdx = Math.floor(Math.random() * pool.length);
        const idx = pool.splice(randomIdx, 1)[0];
        landfill[idx] = hideN(bytes[i]);
        map.push(hideN(idx + 1)); // Lua индексы начинаются с 1
    }
    
    // Генерируем уникальные имена
    const proxyT = genSym(10);
    const vT = genSym(8);
    const mT = genSym(8);
    const kT = genSym(8);
    const runF = genSym(9);
    
    let res = `--[[Картошка смеётся над тобой грязный скиддер]]\n`;
    
    // --- PROXY TABLE ---
    res += `local ${proxyT}={`;
    res += `[${hideN(1)}]=string.char,`;
    res += `[${hideN(2)}]=load,`;
    res += `[${hideN(3)}]=pcall,`;
    res += `[${hideN(4)}]=type`;
    res += `};`;
    
    // --- DATA ---
    res += `local ${vT}={${landfill.join(',')}};`;
    res += `local ${mT}={${map.join(',')}};`;
    res += `local ${kT}={${hideN(k1)},${hideN(k2)}};`;
    
    // --- VM FUNCTION (упрощённая и рабочая версия) ---
    res += `local function ${runF}(t,m,k)`;
    res += `local o="";`;
    res += `local _k1=k[1];`;
    res += `local _k2=k[2];`;
    res += `local _chr=${proxyT}[${hideN(1)}];`;
    res += `for i=1,#m do `;
    res += `local idx=m[i];`;
    res += `local b=t[idx];`;
    res += `local xor1=bit32 and bit32.bxor(b,_k1)or(b~_k1);`;
    res += `local xor2=bit32 and bit32.bxor(xor1,_k2)or(xor1~_k2);`;
    res += `o=o.._chr(xor2);`;
    res += `end;`;
    res += `return o;`;
    res += `end;`;
    
    // --- EXECUTION ---
    res += `local _r=${runF}(${vT},${mT},${kT});`;
    res += `local _f,_e=${proxyT}[${hideN(2)}](_r);`;
    res += `if _f then `;
    res += `local _ok,_err=${proxyT}[${hideN(3)}](_f);`;
    res += `if not _ok then print("Error:",_err)end;`;
    res += `else print("Load Error:",_e)end;`;
    
    document.getElementById('output').value = res;
    document.getElementById('status').innerText = `V21 PARADOX | ${bytes.length} BYTES | ${landfill.length} POOL`;
}

function copyCode() { 
    const o = document.getElementById('output'); 
    if (!o.value) {
        document.getElementById('status').innerText = "ERROR: NOTHING TO COPY";
        return;
    }
    o.select(); 
    document.execCommand('copy');
    document.getElementById('status').innerText = "COPIED TO CLIPBOARD";
    setTimeout(() => {
        document.getElementById('status').innerText = "Proxy Tables | Dead Branches | V21";
    }, 2000);
}
</script>
</body>
</html>
